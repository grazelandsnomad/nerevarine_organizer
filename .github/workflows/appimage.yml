name: AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 22.04 ships glibc 2.35; building here keeps the AppImage
    # forward-compatible with anything on glibc >= 2.35.
    runs-on: ubuntu-22.04

    # Job-level so cmake picks gcc-14 on its very first compiler probe.
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 (for C++26)
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          gcc --version
          g++ --version

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            cmake ninja-build \
            imagemagick \
            libfuse2 \
            fonts-noto-color-emoji \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1

      - name: Relax ImageMagick PNG policy
        # Ubuntu's imagemagick disables PNG reads in policy.xml (CVE-2016-3714)
        # so the icon-resize step in build-appimage.sh fails without this.
        run: |
          for cfg in /etc/ImageMagick-6/policy.xml /etc/ImageMagick-7/policy.xml; do
            [ -f "$cfg" ] || continue
            sudo sed -i 's|rights="none" pattern="PNG"|rights="read\|write" pattern="PNG"|g' "$cfg"
          done

      # Pin Python 3.11 + aqtinstall 3.1.x; the default 3.12 + 3.3.x pair
      # has been exiting non-zero from the Qt 6.7.x module download.
      - name: Setup Python 3.11 for aqtinstall
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt 6.7 (base)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          arch: linux_gcc_64
          aqtversion: '==3.1.*'
          # Cache off: a poisoned cache key returns broken extracts.
          cache: false

      # Best-effort qtwayland install. The AppRun sets QT_QPA_PLATFORM to
      # wayland;xcb so Qt falls back to xcb if the wayland plugin is
      # missing, meaning a flaky aqtinstall doesn't have to block release.
      - name: Install Qt 6.7 qtwayland module (best-effort)
        id: qtwayland
        continue-on-error: true
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: 'qtwayland'
          aqtversion: '==3.1.*'
          cache: false

      - name: Note if qtwayland install failed
        if: steps.qtwayland.outcome == 'failure'
        run: |
          echo "::warning::qtwayland module install failed - AppImage will" \
               "fall back to xcb (xwayland) on Wayland sessions.  Native" \
               "Wayland support disabled for this build."

      - name: Build AppImage
        run: |
          chmod +x ./build-appimage.sh
          ./build-appimage.sh

      - name: Report glibc requirement
        run: |
          echo "-- Symbol-version histogram of bundled binaries --"
          find build-appimage/AppDir -type f ! -l \
            \( -name '*.so*' -o -perm -u+x \) \
            -exec readelf -V {} \; 2>/dev/null \
            | grep -oE 'GLIBC_[0-9.]+' | sort -V | uniq -c | tail -20

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: NerevarineOrganizer-AppImage
          path: NerevarineOrganizer-*-x86_64.AppImage
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NerevarineOrganizer-*-x86_64.AppImage
