name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ctest:
    runs-on: ubuntu-22.04

    # update-alternatives points /usr/bin/gcc → gcc-13 but cmake's
    # auto-detection still looks at /usr/bin/c++ first on Ubuntu, which
    # can resolve to g++-11 (the apt default).  CC/CXX win over both.
    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13 (for C++23 std::expected)
        # ubuntu-22.04 default is gcc-11; gcc-13 lives in jammy-updates/universe
        # and installs without a PPA.  We previously pulled gcc-14 from
        # ubuntu-toolchain-r/test for std::println, but that PPA reaches
        # launchpad.net during add-apt-repository - which has been timing
        # out from the Azure-hosted GitHub runners and stalling the whole
        # job.  std::println was a one-liner in src/logging.cpp; replaced
        # with std::fprintf so we can stay in the regular repos.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          gcc --version
          g++ --version

      - name: Install build dependencies
        run: |
          sudo apt-get install -y cmake ninja-build

      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run ctest
        # Only the "unit" label here.  The "integration" label (test_nxm
        # full mode) needs ~/.local/share/kservices5/nxm.protocol files
        # and reaches out to api.nexusmods.com - neither is available on
        # a stock GitHub runner, so it always failed the job.  Local
        # developers can still run `ctest` with no filter to exercise
        # everything.
        working-directory: build
        run: ctest -L unit --output-on-failure -j"$(nproc)"
