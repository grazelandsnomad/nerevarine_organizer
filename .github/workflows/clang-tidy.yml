name: Clang-Tidy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  clang-tidy:
    # Pin to 24.04: ships libstdc++ 14 (which has <expected>) and matches
    # what the std::expected-based parts of the codebase need to parse.
    # ubuntu-22.04 ships libstdc++ 11 — even with a newer clang-tidy from
    # LLVM apt, the system headers it parses against don't have <expected>.
    runs-on: ubuntu-24.04

    # Use clang as the configure-time compiler so compile_commands.json
    # carries clang-acceptable flags.  GCC's -mno-direct-extern-access on
    # some distros, and other compiler-private flags propagated via Qt's
    # mkspec, make a GCC-emitted JSON unusable by clang-tidy.
    env:
      CC: clang-19
      CXX: clang++-19

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-19 + clang-tidy-19 + Ninja
        # Distro clang-tidy on 22.04 was clang-14, which reports
        # __cpp_concepts = 201907L and fails libstdc++'s
        # `__cplusplus > 202002L && __cpp_concepts >= 202002L` gate on
        # <expected> *even with* -std=c++23.  clang-19 reports
        # __cpp_concepts = 202002L so the gate opens.  Pulling from
        # apt.llvm.org keeps the version explicit and reproducible across
        # ubuntu-latest alias drift.
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 19
          sudo apt-get install -y clang-19 clang-tidy-19 ninja-build cmake
          clang-19 --version
          clang-tidy-19 --version

      - name: Install Qt 6.7
        # Same Qt as the regular Tests workflow so the include paths and
        # macro definitions match what the real build sees.
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure (clang)
        run: |
          cmake -S . -B build-tidy -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Generate AUTOMOC + translation header
        # clang-tidy needs these to exist before it parses TUs that
        # include them; they're build-dir generated files, not in-tree.
        run: |
          cmake --build build-tidy --target translation_keys_header
          cmake --build build-tidy --target nerevarine_organizer_autogen

      - name: Run clang-tidy on src/
        # `--warnings-as-errors='*,-misc-include-cleaner'` makes every
        # enabled check a hard PR-blocking failure EXCEPT
        # misc-include-cleaner.  The negative entry is critical: the
        # .clang-tidy file already lists misc-include-cleaner under
        # WarningsAsErrors's exclusion, but `-warnings-as-errors` on
        # the CLI APPENDS to (rather than overrides) that setting -
        # so a bare '*' here re-enables include-cleaner promotion to
        # error and re-introduces the failure.  Misc-include-cleaner
        # warnings still print so new unused-include regressions are
        # visible at PR review time; legacy include cleanup happens
        # incrementally rather than all-at-once.  xargs parallelism
        # is bounded to nproc to keep the runner from OOM'ing on
        # large TUs (mainwindow.cpp parses heavy with full Qt
        # includes).  `--extra-arg=-std=c++23` is belt-and-suspenders
        # alongside the -std=c++23 already in compile_commands.json.
        run: |
          find src -name "*.cpp" -print0 \
            | xargs -0 -P"$(nproc)" -I{} \
                clang-tidy-19 -p build-tidy --quiet \
                    --warnings-as-errors='*,-misc-include-cleaner' \
                    --extra-arg=-std=c++23 {}
