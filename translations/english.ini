log_triage_log_path=Log
log_triage_no_log=No OpenMW log found at %1. Start OpenMW at least once so it writes its log file, then try again.
log_triage_summary_counts=Errors seen: %1     Classified issues: %2     Suspect mods: %3
log_triage_none=No recognisable errors in the last run - OpenMW ran without the patterns this tool knows about.
log_triage_unattributed=Unattributed (no suspect mod resolved)
log_triage_kind_master=MISSING MASTER
log_triage_kind_plugin=MISSING PLUGIN
log_triage_kind_asset=MISSING ASSET
log_triage_kind_other=OTHER ERROR
log_triage_needs=needs
openmw_inspect_collisions_header=⚠ Duplicate plugin filenames - VFS last-wins silently picks one:
openmw_inspect_collisions_total=%1 collision(s) across %2 plugin file(s) checked.
openmw_inspect_asset_case_header=⚠ Case-variant asset files within the same mod - both load on Linux, one silently shadows the other:
openmw_inspect_asset_case_total=%1 mod(s) affected across %2 file(s) scanned.
openmw_inspect_sync_guard_header=⚠ Mod paths outside the canonical mods root - not portable across machines:
openmw_inspect_sync_guard_canonical=Canonical roots: %1
openmw_inspect_sync_guard_total=%1 mod(s) with non-canonical paths out of %2 installed mod(s).
loadorder_title=Plugin Load Order
loadorder_explain=This is the actual order plugin files are loaded by OpenMW, separate from how mods are arranged in the main window. Drag rows or use ▲/▼ to reorder. "Sort with LOOT" delegates to the LOOT tool (https://loot.github.io/) which applies its community-curated masterlist rules - use it here or via the toolbar button when you want a fresh sort. Masters (.esm) are highlighted blue; plugins belonging to disabled mods are greyed out and won't be emitted to openmw.cfg until the mod is re-enabled.
loadorder_empty=No installed plugins yet. Install some mods with .esp / .esm files first.
loadorder_disabled_tooltip=This plugin's mod is currently disabled. It stays in the load order (position preserved) but won't be written to openmw.cfg until re-enabled.
loadorder_btn_autosort=Sort with LOOT
loadorder_btn_autosort_tooltip=Hand the current load order to LOOT and use its result. Requires LOOT to be installed (loot.github.io).
loadorder_applied=Load order saved; openmw.cfg updated.
loot_missing=LOOT is not installed. Install it from https://loot.github.io/ (or via your distro / Flatpak "io.github.loot.loot") so plugin auto-sorting works. The modlist still saves; just without the sort step.
loot_unsupported_profile=LOOT doesn't support the current game profile. Sorting is skipped.
loot_running=Running LOOT to sort plugins...
loot_launch_failed=Could not launch LOOT. Check that it's installed and on PATH.
loot_timeout=LOOT didn't finish in time (3 min). Giving up on sort; open LOOT manually if needed.
loot_nonzero=LOOT exited with code %1 - sort may have failed. Try running LOOT manually to see the error.
loot_empty_cfg=LOOT finished but openmw.cfg has no content= lines. No sort applied.
loot_done=LOOT finished; load order updated.
loot_dialog_title=Sort Load Order with LOOT
loot_dialog_header=Running LOOT against the current openmw.cfg. Output streams below; the dialog stays open so you can read any warnings before closing.
loot_dialog_command=Command: %1
loot_dialog_running=running…
loot_dialog_cancel=Cancel
loot_dialog_close=Close
loot_dialog_cancelled=Cancelled by user. Load order not changed.
loot_dialog_crashed=LOOT process crashed or failed to start.
loot_dialog_done_ok=LOOT finished successfully. New load order merged; close this dialog to continue.
loot_dialog_done_nonzero=LOOT exited with code %1. Load order NOT changed - review the output above.
loot_banner_missing=LOOT is not installed - plugin auto-sort will be skipped.  Click to open loot.github.io  •  right-click to stop reminding me
