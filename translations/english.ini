conflict_inspector_title=File Conflict Inspector
conflict_inspector_explain=Files that appear in more than one enabled data= folder. OpenMW's VFS is later-wins: the LAST data= listed provides the file that actually loads in game. The winner is shown in bold at the end of each group; earlier entries are shadowed. BSA-packed assets are included - they take part in VFS precedence alongside loose files.
conflict_inspector_none=No file conflicts detected across enabled mods.
