wizard_window_title=Welcome to Nerevarine Organizer
wizard_game_title=Pick your game
wizard_game_subtitle=Choose the game this profile will manage mods for. You can add more profiles later from the toolbar's game button.
wizard_game_body=Each game has its own independent mod list and mods directory. If you play several games, pick one to start with - the rest can be added later.
wizard_modsdir_title=Pick a mods directory
wizard_modsdir_subtitle=Where downloaded and imported mods will live on disk.
wizard_modsdir_body=Pick a folder with enough space for your library. On moddable games like Skyrim, expect 10-50 GB for a mid-sized list. The folder will be created if it doesn't exist.
wizard_modsdir_browse=Browse...
wizard_modsdir_picker_title=Select a mods directory
wizard_apikey_title=Nexus API key (optional)
wizard_apikey_subtitle=Needed for one-click "Download with Mod Manager" links and update checks. You can skip this and set it later in Settings → NexusMods API Key.
wizard_apikey_body=Go to your Nexus account settings, generate a Personal API key, and paste it below. It's stored in your system keyring (libsecret / KWallet), not plain text.
wizard_apikey_open_page=Open Nexus API keys page in browser
wizard_apikey_placeholder=Paste your Personal API key here
wizard_apikey_skip_hint=Leave blank to skip - you'll be prompted the first time a feature needs it.
wizard_integrations_title=External integrations
wizard_integrations_subtitle=Two optional tools that make the experience better. Nothing here is required.
wizard_nxm_body=Registering the nxm:// URL handler lets you click "Download with Mod Manager" on the Nexus website and have Nerevarine Organizer take over automatically.
wizard_nxm_checkbox=Register nxm:// / nxms:// handler now
wizard_loot_body=LOOT sorts your plugin load order using community-curated rules. It's a separate tool that Nerevarine calls when you click the "Sort with LOOT" button in the toolbar. Install it from the link below so the button is ready when you need it.
wizard_loot_open_page=Open loot.github.io (install instructions)
wizard_integrations_finish_hint=Click Finish to start using the app. This wizard won't show up again.
wizard_done_status=Setup complete. Happy modding!
loot_banner_suppressed=LOOT-missing reminder disabled. Toggle via Settings if you change your mind.
