launch_reboot_pending_title=Reboot may be required
launch_reboot_pending_body=A system reboot may be pending — the running kernel (%1) has no matching modules at any of the standard paths (/usr/lib/modules, /lib/modules, /run/{booted,current}-system/kernel-modules).\n\nOn Arch-family distros this usually means a kernel package was upgraded since boot; OpenMW will then fail with opaque driver or input-device errors when it tries to load a module on demand.\n\nIf you're on NixOS, a sandbox, or another setup that keeps modules elsewhere, this check is a false alarm — choose "Run anyway (don't ask again)" to skip it for good.\n\nOtherwise, please reboot and try again.
launch_reboot_pending_run_once=Run anyway
