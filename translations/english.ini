utility_explainer_title=Mark as utility mod?
utility_explainer_body=Utility mods are frameworks or libraries that other mods depend on - e.g. "Skill Framework (OpenMW)", "OAAB_Data", or MWSE shims. They don't add content of their own; they're consumed by content mods.\n\nMarking a mod as a utility just changes its appearance in the list (grey background) so you can tell framework mods apart from content at a glance. It doesn't affect load order, enable/disable, or openmw.cfg in any way.\n\nYou can toggle this any time from the right-click menu.
